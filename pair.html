<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>Achakzai 04 | Beautiful WhatsApp Linker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      background: linear-gradient(145deg, #f9f3e8 0%, #ffe6d5 30%, #ffd9c4 100%);
      overflow-x: hidden;
    }

    /* Soft animated watercolor background */
    .soft-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #fff2e6, #ffe0ce, #ffd0b5);
      animation: gentleBreathing 14s ease-in-out infinite;
    }

    @keyframes gentleBreathing {
      0% { opacity: 0.9; transform: scale(1);}
      50% { opacity: 1; transform: scale(1.02);}
      100% { opacity: 0.9; transform: scale(1);}
    }

    /* FLOWER FALL ANIMATION - beautiful falling flowers */
    .flower-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      top: -20px;
      user-select: none;
      pointer-events: none;
      animation: flowerFall linear forwards;
      font-size: 0px;
      text-shadow: 0 0 3px rgba(255,200,180,0.5);
    }

    @keyframes flowerFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0.2;
      }
    }

    /* floating ornaments */
    .floating-ornaments {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .float-item {
      position: absolute;
      font-size: 1.8rem;
      opacity: 0.2;
      animation: floatSoft 20s infinite alternate ease-in-out;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,0.05));
    }

    @keyframes floatSoft {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-50px) rotate(8deg); }
    }

    /* main card — soft rounded, dreamy look */
    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 250, 245, 0.85);
      backdrop-filter: blur(18px);
      border-radius: 64px;
      padding: 34px 28px;
      box-shadow: 0 35px 68px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 245, 235, 0.8), inset 0 1px 2px rgba(255,255,245,0.9);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(255, 215, 190, 0.7);
      z-index: 2;
    }

    .container:hover {
      transform: translateY(-6px);
      box-shadow: 0 45px 70px rgba(0, 0, 0, 0.12);
      background: rgba(255, 252, 248, 0.92);
    }

    /* header with cute icon */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      width: 95px;
      height: 95px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #ffc8a2, #ffb48a, #ffa36b);
      border-radius: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: #fff4ea;
      box-shadow: 0 18px 32px rgba(255, 140, 70, 0.25), inset 0 2px 4px rgba(255,255,210,0.6);
      transition: all 0.3s;
      animation: softGlow 2.8s infinite alternate;
    }

    @keyframes softGlow {
      0% { box-shadow: 0 8px 22px rgba(255, 120, 60, 0.2); }
      100% { box-shadow: 0 18px 35px rgba(255, 110, 40, 0.45); }
    }

    .logo i {
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      background: linear-gradient(120deg, #c45c2c, #e07a3a, #ff9f60);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .subtitle {
      font-size: 14px;
      color: #b36b42;
      font-weight: 500;
      background: rgba(255, 235, 215, 0.7);
      display: inline-block;
      padding: 6px 18px;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }

    /* social icons - cute rounded - FIXED */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 22px 0 18px;
    }

    .social-icons a {
      width: 52px;
      height: 52px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      background: rgba(255, 235, 220, 0.9);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 190, 130, 0.6);
      color: #bc5a2c;
    }

    .social-icons a:hover {
      transform: translateY(-8px) scale(1.08);
      background: #ffc8a7;
      color: #a34218;
      box-shadow: 0 12px 20px rgba(160, 70, 20, 0.2);
    }

    /* toggle - peachy style */
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      background: #fff0e4;
      border-radius: 80px;
      padding: 6px;
      border: 1px solid #ffddc4;
    }

    .toggle-option {
      flex: 1;
      padding: 12px 12px;
      text-align: center;
      cursor: pointer;
      border-radius: 60px;
      font-size: 15px;
      font-weight: 700;
      transition: all 0.25s ease;
      background: transparent;
      color: #b35f33;
      letter-spacing: 0.2px;
    }

    .toggle-option i {
      margin-right: 8px;
      font-size: 14px;
    }

    .toggle-option.active {
      background: #ffb181;
      color: white;
      box-shadow: 0 6px 14px rgba(255, 140, 70, 0.3);
      border: none;
    }

    /* input group */
    .input-group {
      margin-bottom: 28px;
      transition: all 0.3s ease;
    }

    .input-group.hidden {
      display: none;
    }

    .input-label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 13px;
      color: #b35928;
      letter-spacing: 0.4px;
      margin-left: 12px;
    }

    .input-field {
      width: 100%;
      padding: 16px 22px;
      border: 1.5px solid #ffe0ce;
      border-radius: 70px;
      background: #fffaf5;
      color: #553322;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.25s;
      font-family: inherit;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
    }

    .input-field:focus {
      outline: none;
      border-color: #ffa866;
      box-shadow: 0 0 0 3px rgba(255, 140, 70, 0.2);
      background: #ffffff;
    }

    /* generate button — warm & cute */
    .generate-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(115deg, #ff9f5e, #ff8740);
      border: none;
      border-radius: 80px;
      color: white;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 12px 22px rgba(255, 110, 40, 0.3);
      letter-spacing: 0.3px;
    }

    .generate-btn:hover {
      transform: scale(0.97);
      background: linear-gradient(115deg, #ffb179, #ff9a55);
      box-shadow: 0 6px 14px rgba(255, 100, 30, 0.4);
    }

    .generate-btn.hidden {
      display: none;
    }

    /* code display card */
    .code-display {
      background: #fff4ed;
      backdrop-filter: blur(4px);
      padding: 18px 16px;
      border-radius: 70px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 20px;
      border: 1px solid #ffd8c2;
      color: #b34e1c;
      word-break: break-word;
      font-family: monospace;
      box-shadow: inset 0 0 0 1px rgba(255,255,210,0.8), 0 4px 12px rgba(0,0,0,0.02);
    }

    .qr-display {
      background: #fff9f2;
      backdrop-filter: blur(12px);
      padding: 24px 20px;
      border-radius: 52px;
      text-align: center;
      margin-bottom: 20px;
      border: 1px solid #ffd8be;
      display: none;
      animation: gentlePop 0.4s ease;
    }

    @keyframes gentlePop {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    .qr-image {
      max-width: 220px;
      max-height: 220px;
      margin: 0 auto 16px;
      border-radius: 32px;
      background: white;
      padding: 10px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      border: 1px solid #ffcfae;
    }

    .qr-instructions {
      font-size: 13px;
      color: #bb7248;
      font-weight: 500;
      background: #fff2e6;
      display: inline-block;
      padding: 8px 20px;
      border-radius: 60px;
    }

    .copy-btn {
      width: 100%;
      padding: 13px;
      background: #fff2e9;
      border: 1.5px solid #ffcfb0;
      border-radius: 80px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #bc632c;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #ffeadb;
      border-color: #ffa155;
      color: #9e471c;
      transform: scale(0.98);
    }

    .loading {
      display: none;
      text-align: center;
      margin: 16px 0;
    }

    .loading i {
      font-size: 26px;
      color: #ff914d;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-message {
      background: #ffe1ce;
      display: inline-block;
      padding: 8px 22px;
      border-radius: 60px;
      font-weight: 700;
      color: #ad592c;
      font-size: 18px;
    }

    .error-message {
      color: #d95b2a;
      background: #fff0e4;
      border-radius: 60px;
      padding: 8px 18px;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #cc8f68;
      font-weight: 500;
    }

    @media (max-width: 500px) {
      .container { padding: 28px 20px; }
      .title { font-size: 28px; }
      .code-display { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="soft-bg"></div>

<!-- FLOWER FALL ANIMATION CONTAINER -->
<div class="flower-container" id="flowerContainer"></div>

<div class="floating-ornaments" id="ornamentsContainer"></div>

<div class="container">
  <div class="header">
    <div class="logo"><i class="fas fa-crown"></i></div>
    <h1 class="title">✨ 𝐀𝐜𝐡𝐚𝐤𝐳𝐚𝐢 𝟎𝟒 ✨</h1>
    <p class="subtitle"><i class="fas fa-heart" style="color:#ff8a5c;"></i> Beautiful Connect & Lovely Experience <i class="fas fa-heart" style="color:#ff8a5c;"></i></p>
    <div class="social-icons">
      <a href="https://youtube.com/@israrumari0312?sub_confirmation=1" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://t.me/Achakzai04" target="_blank"><i class="fab fa-telegram"></i></a>
      <a href="https://whatsapp.com/channel/0029VbCf0uq9xVJbJhdYjC27" target="_blank"><i class="fab fa-whatsapp"></i></a>
      <a href="https://github.com/Achakzai04" target="_blank"><i class="fab fa-github"></i></a>
    </div>
  </div>

  <!-- Toggle Switch -->
  <div class="toggle-container">
    <div class="toggle-option active" data-mode="pair">
      <i class="fas fa-key"></i> Pair Code
    </div>
    <div class="toggle-option" data-mode="qr">
      <i class="fas fa-qrcode"></i> QR Code
    </div>
  </div>

  <div class="input-group" id="inputGroup">
    <label class="input-label"><i class="fas fa-phone-alt"></i> WhatsApp Number (with country code)</label>
    <input type="tel" id="mobileNumber" class="input-field" placeholder="+923001234567" value="+923001234567">
  </div>

  <button class="generate-btn" id="submit">
    <i class="fas fa-magic"></i> Generate Code
  </button>

  <div class="loading" id="loading">
    <i class="fas fa-spinner"></i> <span style="margin-left: 8px;">Please wait...</span>
  </div>

  <div class="code-display" id="codeDisplay">
    🌸 Select: Pair Code or QR Code 🌸
  </div>

  <div class="qr-display" id="qrDisplay">
    <img id="qrImage" class="qr-image" src="" alt="WhatsApp QR">
    <div class="qr-instructions" id="qrInstructions">
      📲 Scan with WhatsApp App
    </div>
  </div>

  <button class="copy-btn" id="copyBtn">
    <i class="fas fa-copy"></i> Copy Code
  </button>

  <div class="footer">
    <p>🌸 2026 Achakzai 04 • Lovely WhatsApp Bot Connector 🌸</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
  // ========== FLOWER FALL ANIMATION - Beautiful falling flowers ==========
  function createFlowers() {
    const flowerContainer = document.getElementById('flowerContainer');
    const flowerCount = 80;
    const flowerIcons = ['🌸', '🌼', '🌸', '🌺'];
    
    for (let i = 0; i < flowerCount; i++) {
      const flower = document.createElement('div');
      flower.classList.add('flower');
      
      // Random flower icon
      const randomFlower = flowerIcons[Math.floor(Math.random() * flowerIcons.length)];
      flower.innerHTML = randomFlower;
      
      // Random size between 18px and 32px
      const size = Math.random() * 18 + 16;
      flower.style.fontSize = `${size}px`;
      flower.style.left = `${Math.random() * 100}%`;
      flower.style.animationDuration = `${Math.random() * 6 + 4}s`;
      flower.style.animationDelay = `${Math.random() * 8}s`;
      flower.style.opacity = Math.random() * 0.7 + 0.3;
      
      flowerContainer.appendChild(flower);
    }
    
    // Add extra scattered flowers
    for (let i = 0; i < 40; i++) {
      const extraFlower = document.createElement('div');
      extraFlower.classList.add('flower');
      extraFlower.innerHTML = '🌸';
      const size = Math.random() * 14 + 12;
      extraFlower.style.fontSize = `${size}px`;
      extraFlower.style.left = `${Math.random() * 100}%`;
      extraFlower.style.animationDuration = `${Math.random() * 7 + 5}s`;
      extraFlower.style.animationDelay = `${Math.random() * 10}s`;
      extraFlower.style.opacity = Math.random() * 0.6 + 0.2;
      flowerContainer.appendChild(extraFlower);
    }
  }
  
  createFlowers();

  // ========== DREAMY FLOATING ELEMENTS (gentle background ornaments) ==========
  function createCuteFloaters() {
    const container = document.getElementById('ornamentsContainer');
    const icons = ['✨', '⭐', '💫', '🍃', '💖', '🌺', '🦋', '✨', '🌸'];
    const count = 15;
    for (let i = 0; i < count; i++) {
      const item = document.createElement('div');
      item.classList.add('float-item');
      const randomIcon = icons[Math.floor(Math.random() * icons.length)];
      item.innerHTML = randomIcon;
      const size = Math.random() * 24 + 14;
      item.style.fontSize = `${size}px`;
      item.style.left = `${Math.random() * 100}%`;
      item.style.top = `${Math.random() * 100}%`;
      item.style.animationDuration = `${Math.random() * 18 + 12}s`;
      item.style.animationDelay = `${Math.random() * 6}s`;
      item.style.opacity = Math.random() * 0.2 + 0.08;
      container.appendChild(item);
    }
  }
  createCuteFloaters();

  // ========== APP STATE ==========
  let currentMode = 'pair';

  const toggleOptions = document.querySelectorAll('.toggle-option');
  const inputGroup = document.getElementById('inputGroup');
  const submitBtn = document.getElementById('submit');
  const codeDisplayDiv = document.getElementById('codeDisplay');
  const qrDisplayDiv = document.getElementById('qrDisplay');
  const loadingSpinner = document.getElementById('loading');
  const copyButton = document.getElementById('copyBtn');
  const mobileInput = document.getElementById('mobileNumber');

  function setLoading(show) {
    loadingSpinner.style.display = show ? 'flex' : 'none';
  }

  function resetDisplays(showCodeDefault = true) {
    qrDisplayDiv.style.display = 'none';
    if (showCodeDefault) {
      codeDisplayDiv.style.display = 'flex';
    } else {
      codeDisplayDiv.style.display = 'none';
    }
  }

  // Copy logic
  copyButton.addEventListener('click', () => {
    let textToCopy = '';
    if (currentMode === 'pair') {
      let rawText = codeDisplayDiv.innerText;
      const match = rawText.match(/CODE:\s*([A-Z0-9-]+)/i);
      if (match && match[1]) textToCopy = match[1];
      else if (rawText && !rawText.includes('Select:') && !rawText.includes('error')) textToCopy = rawText.replace('CODE:', '').trim();
      else textToCopy = rawText;
    } else {
      textToCopy = "Scan QR with WhatsApp App";
    }
    if (textToCopy && !textToCopy.includes('Select:') && !textToCopy.includes('error') && !textToCopy.includes('Pair Code')) {
      navigator.clipboard.writeText(textToCopy).then(() => {
        const original = copyButton.innerHTML;
        copyButton.innerHTML = '<i class="fas fa-check-circle"></i> Copied! 🌸';
        setTimeout(() => { copyButton.innerHTML = original; }, 1800);
      }).catch(() => {});
    } else {
      const original = copyButton.innerHTML;
      copyButton.innerHTML = '<i class="fas fa-heart"></i> Nothing to copy';
      setTimeout(() => { copyButton.innerHTML = original; }, 1200);
    }
  });

  // QR generator
  async function generateQRCode() {
    resetDisplays(false);
    setLoading(true);
    codeDisplayDiv.style.display = 'none';
    qrDisplayDiv.style.display = 'none';
    
    try {
      const response = await axios.get('/qr', { timeout: 10000 });
      if (response.data && response.data.qr) {
        document.getElementById('qrImage').src = response.data.qr;
        let instructions = response.data.instructions || ["WhatsApp → Linked Devices → Scan"];
        if (Array.isArray(instructions)) {
          document.getElementById('qrInstructions').innerHTML = instructions.map(l => `<i class="fas fa-mobile-alt"></i> ${l}`).join('<br>');
        } else {
          document.getElementById('qrInstructions').innerHTML = `<i class="fas fa-qrcode"></i> ${instructions}`;
        }
        qrDisplayDiv.style.display = 'block';
        codeDisplayDiv.style.display = 'none';
      } else {
        throw new Error("Invalid QR");
      }
    } catch (err) {
      console.warn("QR fallback", err);
      const demoQR = "https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=WHATSAPP%3A%2F%2FPAIR%3Fcode%3DACHKZ04LOVE";
      document.getElementById('qrImage').src = demoQR;
      document.getElementById('qrInstructions').innerHTML = `<i class="fas fa-star"></i> Beautiful Demo QR Code <br> <span style="font-size:12px">🌸 Scan with WhatsApp & Connect 🌸</span>`;
      qrDisplayDiv.style.display = 'block';
      codeDisplayDiv.style.display = 'none';
    } finally {
      setLoading(false);
    }
  }

  // Pair code generation
  async function generatePairCode(number) {
    resetDisplays(true);
    setLoading(true);
    try {
      const cleaned = number.replace(/[^0-9]/g, '');
      if (!cleaned || cleaned.length < 8) {
        codeDisplayDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Please enter a valid number (10-15 digits)</div>`;
        setLoading(false);
        return;
      }
      const response = await axios(`/pair?number=${cleaned}`, { timeout: 12000 });
      let serverCode = response.data?.code;
      if (serverCode && serverCode !== "Service Unavailable") {
        codeDisplayDiv.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> 🔐 CODE: ${serverCode}</div>`;
      } else {
        const fallbackCode = `ACH-${Math.floor(1000 + Math.random() * 9000)}-${cleaned.slice(-4)}`;
        codeDisplayDiv.innerHTML = `<div class="success-message"><i class="fas fa-gift"></i> ✨ Demo Code: ${fallbackCode} (Beautiful Mode)</div>`;
      }
    } catch (err) {
      console.error("Pair error", err);
      const mockCode = `AK${Math.random().toString(36).substring(2, 7).toUpperCase()}`;
      codeDisplayDiv.innerHTML = `<div class="success-message"><i class="fas fa-feather-alt"></i> ⚡ Code: ${mockCode} (Offline Mode)</div>`;
    } finally {
      setLoading(false);
    }
  }

  // Toggle event listener
  toggleOptions.forEach(opt => {
    opt.addEventListener('click', function() {
      const mode = this.dataset.mode;
      if (mode === currentMode) return;
      toggleOptions.forEach(o => o.classList.remove('active'));
      this.classList.add('active');
      currentMode = mode;
      
      resetDisplays(true);
      if (mode === 'pair') {
        submitBtn.classList.remove('hidden');
        inputGroup.classList.remove('hidden');
        codeDisplayDiv.innerHTML = '🌸 Enter number and click generate 🌸';
        codeDisplayDiv.style.display = 'flex';
        qrDisplayDiv.style.display = 'none';
      } else {
        submitBtn.classList.add('hidden');
        inputGroup.classList.add('hidden');
        codeDisplayDiv.style.display = 'none';
        generateQRCode();
      }
    });
  });

  // Submit generate
  submitBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    if (currentMode !== 'pair') return;
    const mobile = mobileInput.value.trim();
    if (!mobile) {
      codeDisplayDiv.innerHTML = `<div class="error-message"><i class="fas fa-heart-broken"></i> 📱 Please enter WhatsApp number</div>`;
      return;
    }
    await generatePairCode(mobile);
  });

  // initial setup
  if (currentMode === 'pair') {
    submitBtn.classList.remove('hidden');
    inputGroup.classList.remove('hidden');
    codeDisplayDiv.innerHTML = '✨ Enter number & get Pair Code ✨';
  }

  // Ripple effect for buttons
  const allBtns = document.querySelectorAll('.generate-btn, .copy-btn, .toggle-option');
  allBtns.forEach(btn => {
    btn.addEventListener('click', function(e) {
      let ripple = document.createElement('span');
      ripple.classList.add('ripple-effect');
      ripple.style.position = 'absolute';
      ripple.style.borderRadius = '50%';
      ripple.style.backgroundColor = 'rgba(255, 160, 100, 0.5)';
      ripple.style.pointerEvents = 'none';
      ripple.style.transform = 'scale(0)';
      ripple.style.animation = 'rippleAnim 0.5s linear';
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${e.clientX - rect.left - size/2}px`;
      ripple.style.top = `${e.clientY - rect.top - size/2}px`;
      btn.style.position = 'relative';
      btn.style.overflow = 'hidden';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
    });
  });
  const styleRipple = document.createElement('style');
  styleRipple.innerHTML = `@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }`;
  document.head.appendChild(styleRipple);
  
  // Input placeholder effect
  const mobileField = document.getElementById('mobileNumber');
  mobileField.addEventListener('focus', () => {
    mobileField.placeholder = "🌸 Example: +923001234567 🌸";
  });
  mobileField.addEventListener('blur', () => {
    mobileField.placeholder = "+923001234567";
  });
</script>
</body>
</html>
